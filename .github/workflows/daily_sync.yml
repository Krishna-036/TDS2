name: DevSync Daily Update

on:
  schedule:
    # Runs at 04:30 UTC every day
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  daily_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update activity log for 22f3003113@ds.study.iitm.ac.in
        run: |
          echo "Last Sync: $(date)" > devsync_status.txt

      - name: Commit and Push changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "22f3003113@ds.study.iitm.ac.in"
          git add devsync_status.txt
          git commit -m "Automated daily sync for DevSync repository"
          git push
